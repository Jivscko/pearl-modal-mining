name: Test Pearl Mining Setup

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black pylint
      
      - name: Lint Python code
        run: |
          black --check modal_pearl.py
          pylint modal_pearl.py --disable=C0114,C0116 || true
      
      - name: Validate configuration
        run: |
          python -c "import modal_pearl; print('✅ modal_pearl.py syntax OK')"
